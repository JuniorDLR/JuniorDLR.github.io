<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Andrea Montalvan</title>
    <link rel="stylesheet" href="style/style.css">

</head>

<body>

    <div class="envlope-wrapper">
        <img id="leftImage" src="image/imagen1.jpg" alt="Left Image" class="side-image" style="display:none;">

        <div id="envelope" class="close">
            <div class="front flap"></div>
            <div class="front pocket"></div>
            <div class="letter">
                <div class="words line1"></div>
                <div class="words line2"></div>
                <div class="words line3"></div>
                <div class="words line4"></div>
            </div>
            <div class="hearts">
                <div class="heart a1"></div>
                <div class="heart a2"></div>
                <div class="heart a3"></div>
            </div>
        </div>

        <img id="rightImage" src="image/imagen2.jpg" alt="Right Image" class="side-image" style="display:none;">

    </div>

    <div class="reset">
        <button id="open">Abrir</button>
        <button id="reset">Cerrar</button>
    </div>

    <div class="reset">
        <div id="message" style="display:none;">
            Quiero recordarte que eres una persona única y especial, tu belleza brilla de manera incomparable.
            <br>
            Feliz día Andreita ❤️
        </div>
    </div>

    <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js'></script>
    <script src="script/script.js"></script>

</body>

</html>
